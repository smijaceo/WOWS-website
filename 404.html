<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="icon" href="/favicon-192.png" sizes="192x192" type="image/png">
    <title>404 | Wolves Of Wall Street</title>
    <meta name="robots" content="noindex">
    <style>
        @font-face { font-family: 'Bebas Neue'; font-style: normal; font-weight: 400; font-display: swap; src: url('/fonts/BebasNeue-400.woff2') format('woff2'); }
        @font-face { font-family: 'DM Sans'; font-style: normal; font-weight: 400 700; font-display: swap; src: url('/fonts/DMSans.woff2') format('woff2'); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif; background: #080808; color: #f5f5f5;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            padding: 2rem; -webkit-font-smoothing: antialiased;
        }
        img.logo { height: 56px; margin-bottom: 2rem; opacity: 0.9; }
        .code {
            font-family: 'Bebas Neue', sans-serif; font-size: clamp(5rem, 18vw, 9rem);
            line-height: 1; letter-spacing: 4px; color: #00e676; margin-bottom: 0.5rem;
        }
        h1 {
            font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.6rem, 5vw, 2.4rem);
            letter-spacing: 2px; margin-bottom: 0.75rem;
        }
        p { color: #888; max-width: 420px; line-height: 1.6; margin-bottom: 2rem; }
        .actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
        a.btn {
            background: #00e676; color: #080808; padding: 0.85rem 2rem;
            border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 0.95rem;
            transition: all 0.25s; box-shadow: 0 4px 24px rgba(0, 230, 118, 0.25);
        }
        a.btn:hover { transform: translateY(-2px); }
        a.ghost {
            background: transparent; color: #f5f5f5; padding: 0.85rem 2rem;
            border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.95rem;
            border: 1px solid #2a2a2a; transition: all 0.25s;
        }
        a.ghost:hover { border-color: #888; }
    </style>
</head>
<body>
    <img class="logo" src="/wolf-logo.svg" alt="Wolves Of Wall Street">
    <div class="code">404</div>
    <h1>This page wandered off from the pack</h1>
    <p>The page you're looking for doesn't exist or got moved. The pack's this way.</p>
    <div class="actions">
        <a class="btn" href="/">Back to the Den</a>
        <a class="ghost" href="https://discord.gg/sGHTJEJfwz">Join the Discord</a>
    </div>
</body>
</html>
